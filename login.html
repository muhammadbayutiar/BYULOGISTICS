
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BYULOGISTICS</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="login-brand">
                <a href="index.html" class="logo">
                    <i class="fas fa-truck-fast"></i>
                    <span>BYU<span class="logo-accent">LOGISTICS</span></span>
                </a>
            </div>
            <div class="login-content">
                <h1>Selamat Datang</h1>
                <p>Masuk ke dashboard 管理 untuk mengelola pengiriman dan armada logistik Anda.</p>
                <div class="login-features">
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Kelola Pengiriman</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Track Armada</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Kelola Pelanggan</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="login-right">
            <div class="login-form-wrapper">
                <div class="form-header">
                    <h2>Masuk</h2>
                    <p>Silakan masuk dengan akun Anda</p>
                </div>
                
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="admin@byulogistics.com" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                            <button type="button" class="toggle-password" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember">
                            <span class="checkmark"></span>
                            Ingat saya
                        </label>
                        <a href="#" class="forgot-password">Lupa password?</a>
                    </div>
                    
                    <button type="submit" class="btn-login">
                        <span>Masuk</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
                
                <div class="login-divider">
                    <span>atau masuk dengan</span>
                </div>
                
                <div class="social-login">
                    <button class="social-btn google">
                        <i class="fab fa-google"></i>
                        Google
                    </button>
                    <button class="social-btn facebook">
                        <i class="fab fa-facebook-f"></i>
                        Facebook
                    </button>
                </div>
                
                <p class="back-to-home">
                    <a href="index.html"><i class="fas fa-arrow-left"></i> Kembali ke halaman utama</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Error/Success Notification -->
    <div class="notification" id="notification" style="display: none;">
        <div class="notification-content">
            <i class="fas fa-exclamation-circle"></i>
            <span id="notificationMessage"></span>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
